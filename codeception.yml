namespace: Tests
support_namespace: Support
paths:
    tests: tests
    output: tests/_output
    data: tests/Support/Data
    support: tests/Support
    envs: tests/_envs
actor_suffix: Tester
suites:
    Unit:
        enabled: true
    Functional:
        enabled: true
    Acceptance:
        enabled: true
extensions:
    enabled:
        - Codeception\Extension\RunFailed
